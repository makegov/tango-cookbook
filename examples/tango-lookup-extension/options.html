<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Tango Lookup Settings</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 1.5rem;
        width: 400px;
        color: #1a1a1a;
      }
      h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
      .env-section { margin-bottom: 1.5rem; }
      .env-section h3 {
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #666;
        margin-bottom: 0.5rem;
      }
      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: #999;
        text-transform: uppercase;
        margin-bottom: 2px;
        margin-top: 0.5rem;
      }
      label:first-of-type { margin-top: 0; }
      input {
        width: 100%;
        padding: 0.4rem 0.5rem;
        font-size: 0.85rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: "SF Mono", SFMono-Regular, Menlo, monospace;
      }
      .save-btn {
        margin-top: 1rem;
        padding: 6px 16px;
        font-size: 0.85rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
      }
      .save-btn:hover { background: #eee; }
      .status-msg {
        font-size: 0.8rem;
        color: #2e7d32;
        margin-top: 0.5rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>Tango Lookup Settings</h2>

    <div class="env-section">
      <h3>Production</h3>
      <label for="prodUrl">Base URL</label>
      <input type="text" id="prodUrl" placeholder="https://tango.makegov.com">
      <label for="prodKey">API Key</label>
      <input type="password" id="prodKey" placeholder="your-production-api-key">
    </div>

    <button class="save-btn" id="saveBtn">Save</button>
    <div class="status-msg" id="statusMsg">Saved!</div>

    <script src="options.js"></script>
  </body>
</html>
